<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>REAmo</title>

    <!-- PWA - iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- PWA - Android -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- PWA - Universal -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <meta name="theme-color" content="#1a1a1a">

    <!-- Inline critical CSS - shows immediately before bundle parses -->
    <style>
      body {
        margin: 0;
        background: #1a1a1a;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #loading-skeleton {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        gap: 16px;
      }
      #loading-skeleton .icon {
        width: 80px;
        height: 80px;
      }
      #loading-skeleton .title {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin: 0;
      }
      #loading-skeleton .spinner {
        width: 24px;
        height: 24px;
        margin-top: 8px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading skeleton - shows immediately, replaced when React mounts -->
      <div id="loading-skeleton">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <rect width="120" height="120" rx="24" fill="#1a1a1a"/>
          <rect x="36" y="20" width="48" height="80" rx="14" fill="#3a3a3a"/>
          <circle cx="60" cy="52" r="12" fill="#5ba3d4" opacity="0.9"/>
          <circle cx="52" cy="66" r="12" fill="#7ec96b" opacity="0.9"/>
          <circle cx="68" cy="66" r="12" fill="#d4956b" opacity="0.9"/>
        </svg>
        <p class="title">REAmo</p>
        <!-- Lucide loader-circle spinner -->
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
