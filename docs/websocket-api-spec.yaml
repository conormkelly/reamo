openapi: 3.0.3
info:
  title: REAPER WebSocket Extension API
  description: |
    Native WebSocket API for REAPER DAW control.

    ## Connection
    Connect via WebSocket to `ws://localhost:{port}?token={token}`

    - **Port discovery:** Query `/_/GET/EXTSTATE/Reamo/WebSocketPort` via HTTP.
      Response format: `EXTSTATE\tReamo\tWebSocketPort\t9224` (tab-separated).
    - **Authentication:** Query `/_/GET/EXTSTATE/Reamo/AuthToken` via HTTP.
      Token is generated fresh each REAPER session. Required for connection.

    ## Connection Handshake
    1. Client connects with `?token=xxx` query parameter
    2. Server validates token (closes with 4001 if invalid)
    3. Client sends `hello` message with version info
    4. Server validates protocol version (closes with 4002 if incompatible)
    5. Server sends `snapshot` with full state

    ## Protocol
    All messages are JSON. The server pushes state updates automatically.
    Clients send commands and receive responses.

    ## Message Format
    ```json
    {
      "type": "event|command|response|error",
      "id": "optional-correlation-id",
      "payload": { ... }
    }
    ```

    ## Subscription Model
    After handshake, client receives full state snapshot.
    Subsequently, only deltas are pushed when state changes.

  version: 1.0.0
  license:
    name: MIT

servers:
  - url: ws://localhost:9224
    description: Local REAPER instance

# Empty paths - this is a WebSocket API, not REST.
# TODO: Migrate to AsyncAPI for proper WebSocket API documentation.
paths: {}

# =============================================================================
# WebSocket Message Schemas
# =============================================================================

components:
  schemas:

    # -------------------------------------------------------------------------
    # Core Message Envelope
    # -------------------------------------------------------------------------

    Message:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [event, command, response, error]
        id:
          type: string
          description: Correlation ID for command/response matching
        payload:
          type: object

    # -------------------------------------------------------------------------
    # Client -> Server Handshake
    # -------------------------------------------------------------------------

    # First message client must send after connection
    HelloMessage:
      type: object
      description: |
        Client must send this immediately after WebSocket connection.
        Server will validate protocol version before sending snapshot.
      required: [type, clientVersion, protocolVersion]
      properties:
        type:
          type: string
          enum: [hello]
        clientVersion:
          type: string
          description: Client application version (semver)
          example: "1.2.0"
        protocolVersion:
          type: integer
          description: Protocol version client supports
          example: 1

    # -------------------------------------------------------------------------
    # Server -> Client Events (Push)
    # -------------------------------------------------------------------------

    # Full state snapshot sent after successful hello
    StateSnapshot:
      type: object
      properties:
        type:
          type: string
          enum: [event]
        event:
          type: string
          enum: [snapshot]
        payload:
          type: object
          required: [extensionVersion, protocolVersion]
          properties:
            extensionVersion:
              type: string
              description: Server extension version (semver)
              example: "1.0.0"
            protocolVersion:
              type: integer
              description: Protocol version server supports
              example: 1
            transport:
              $ref: '#/components/schemas/TransportState'
            timeSelection:
              $ref: '#/components/schemas/TimeSelection'
            project:
              $ref: '#/components/schemas/ProjectInfo'
            markers:
              type: array
              items:
                $ref: '#/components/schemas/Marker'
            regions:
              type: array
              items:
                $ref: '#/components/schemas/Region'

    # Delta updates - only changed fields
    TransportUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [event]
        event:
          type: string
          enum: [transport]
        payload:
          $ref: '#/components/schemas/TransportState'

    TimeSelectionUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [event]
        event:
          type: string
          enum: [timeSelection]
        payload:
          $ref: '#/components/schemas/TimeSelection'

    MarkersUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [event]
        event:
          type: string
          enum: [markers]
        payload:
          type: object
          properties:
            markers:
              type: array
              items:
                $ref: '#/components/schemas/Marker'
            # Optional: granular change info
            changes:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                    enum: [add, update, remove]
                  id:
                    type: integer

    RegionsUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [event]
        event:
          type: string
          enum: [regions]
        payload:
          type: object
          properties:
            regions:
              type: array
              items:
                $ref: '#/components/schemas/Region'
            changes:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                    enum: [add, update, remove]
                  id:
                    type: integer

    # -------------------------------------------------------------------------
    # State Objects
    # -------------------------------------------------------------------------

    TransportState:
      type: object
      description: |
        Complete transport state. Replaces: TRANSPORT, BEATPOS polling.
        Eliminates need for BPM reverse-calculation.
      properties:
        playState:
          type: string
          enum: [stopped, playing, paused, recording]
        positionSeconds:
          type: number
          format: double
          description: Current position in seconds
        positionBeats:
          type: string
          description: "Formatted position: '12.3.45' (bar.beat.ticks)"
        cursorPosition:
          type: number
          format: double
          description: Edit cursor position in seconds
        bpm:
          type: number
          format: double
          description: Current tempo in BPM (direct from API, not calculated)
        timeSignature:
          type: object
          properties:
            numerator:
              type: integer
              example: 4
            denominator:
              type: integer
              example: 4
        # Project timing info (eliminates bar offset calculation)
        barOffset:
          type: integer
          description: Project bar offset (what bar number position 0 is)

    TimeSelection:
      type: object
      description: |
        Direct time selection access. Replaces cursor-movement hack entirely.
      properties:
        hasSelection:
          type: boolean
        startSeconds:
          type: number
          format: double
          nullable: true
        endSeconds:
          type: number
          format: double
          nullable: true
        # Convenience: pre-formatted values
        startFormatted:
          type: string
          nullable: true
          description: "Formatted as bar.beat.ticks"
        endFormatted:
          type: string
          nullable: true
        # Loop points (separate from time selection)
        loop:
          type: object
          properties:
            enabled:
              type: boolean
            startSeconds:
              type: number
              format: double
            endSeconds:
              type: number
              format: double

    ProjectInfo:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        sampleRate:
          type: integer
          example: 48000
        length:
          type: number
          format: double
          description: Project length in seconds
        # Change counter for client-side cache invalidation
        stateChangeCount:
          type: integer
          description: Increments on any project change

    Marker:
      type: object
      properties:
        id:
          type: integer
          description: REAPER's internal marker index
        position:
          type: number
          format: double
          description: Position in seconds
        name:
          type: string
        color:
          type: integer
          description: REAPER color value (0 = default)
        # Pre-formatted for display
        positionFormatted:
          type: string

    Region:
      type: object
      properties:
        id:
          type: integer
          description: REAPER's internal region index
        startSeconds:
          type: number
          format: double
        endSeconds:
          type: number
          format: double
        name:
          type: string
        color:
          type: integer
        # Pre-formatted for display
        startFormatted:
          type: string
        endFormatted:
          type: string

    # -------------------------------------------------------------------------
    # Client -> Server Commands
    # -------------------------------------------------------------------------

    # Transport commands
    TransportCommand:
      type: object
      properties:
        type:
          type: string
          enum: [command]
        id:
          type: string
        command:
          type: string
          enum:
            - transport/play
            - transport/pause
            - transport/stop
            - transport/record
            - transport/toggle
            - transport/seek
            - transport/seekBeats
        payload:
          type: object
          properties:
            # For seek commands
            position:
              type: number
              description: Position in seconds (for transport/seek)
            bar:
              type: integer
              description: Bar number (for transport/seekBeats)
            beat:
              type: number
              description: Beat within bar (for transport/seekBeats)

    # Time selection commands
    TimeSelectionCommand:
      type: object
      properties:
        type:
          type: string
          enum: [command]
        id:
          type: string
        command:
          type: string
          enum:
            - timeSelection/set
            - timeSelection/clear
            - timeSelection/setLoop
        payload:
          type: object
          properties:
            startSeconds:
              type: number
            endSeconds:
              type: number
            # Alternative: set by bar/beat
            startBar:
              type: integer
            startBeat:
              type: number
            endBar:
              type: integer
            endBeat:
              type: number

    # Marker commands
    MarkerCommand:
      type: object
      properties:
        type:
          type: string
          enum: [command]
        id:
          type: string
        command:
          type: string
          enum:
            - marker/add
            - marker/update
            - marker/delete
            - marker/goto
        payload:
          type: object
          properties:
            id:
              type: integer
              description: Required for update/delete/goto
            position:
              type: number
              description: Position in seconds
            name:
              type: string
            color:
              type: integer

    # Region commands
    RegionCommand:
      type: object
      properties:
        type:
          type: string
          enum: [command]
        id:
          type: string
        command:
          type: string
          enum:
            - region/add
            - region/update
            - region/delete
            - region/goto
        payload:
          type: object
          properties:
            id:
              type: integer
            startSeconds:
              type: number
            endSeconds:
              type: number
            name:
              type: string
            color:
              type: integer

    # Batch command for atomic operations
    BatchCommand:
      type: object
      description: Execute multiple commands atomically
      properties:
        type:
          type: string
          enum: [command]
        id:
          type: string
        command:
          type: string
          enum: [batch]
        payload:
          type: object
          properties:
            commands:
              type: array
              items:
                type: object
                description: Individual command objects

    # -------------------------------------------------------------------------
    # Server -> Client Responses
    # -------------------------------------------------------------------------

    CommandResponse:
      type: object
      properties:
        type:
          type: string
          enum: [response]
        id:
          type: string
          description: Correlation ID from command
        success:
          type: boolean
        payload:
          type: object
          description: Command-specific response data
          properties:
            # For add commands, returns the created ID
            id:
              type: integer

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          enum: [error]
        id:
          type: string
          nullable: true
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - AUTH_FAILED        # Invalid or missing auth token (WebSocket close 4001)
                - PROTOCOL_MISMATCH  # Client protocol version incompatible (WebSocket close 4002)
                - INVALID_COMMAND    # Unknown command type
                - INVALID_PAYLOAD    # Malformed or invalid payload
                - NOT_FOUND          # Resource (marker, region, etc.) not found
                - REAPER_ERROR       # REAPER API returned an error
                - INTERNAL_ERROR     # Unexpected server error
            message:
              type: string

# =============================================================================
# Example Message Flows
# =============================================================================

x-message-examples:

  connection-handshake:
    description: |
      Full connection handshake flow:
      1. Client connects to ws://localhost:9224?token=abc123
      2. Server accepts connection (or closes with 4001 if token invalid)
      3. Client sends hello with version info
      4. Server validates protocol (or closes with 4002 if incompatible)
      5. Server sends snapshot with full state
    messages:
      - direction: client->server
        content:
          type: hello
          clientVersion: "1.2.0"
          protocolVersion: 1
      - direction: server->client
        content:
          type: event
          event: snapshot
          payload:
            extensionVersion: "1.0.0"
            protocolVersion: 1
            transport:
              playState: stopped
              positionSeconds: 45.5
              positionBeats: "12.3.00"
              cursorPosition: 45.5
              bpm: 120
              timeSignature: { numerator: 4, denominator: 4 }
              barOffset: 0
            timeSelection:
              hasSelection: true
              startSeconds: 40.0
              endSeconds: 50.0
              startFormatted: "11.1.00"
              endFormatted: "13.3.00"
              loop: { enabled: false, startSeconds: 0, endSeconds: 0 }
            project:
              name: "My Project"
              sampleRate: 48000
              length: 180.5
              stateChangeCount: 42
            markers: []
            regions: []

  transport-update-push:
    description: Server pushes transport change (user pressed play in REAPER)
    messages:
      - direction: server->client
        content:
          type: event
          event: transport
          payload:
            playState: playing
            positionSeconds: 45.5
            # Only changed fields need to be sent

  seek-command:
    description: Client sends seek command
    messages:
      - direction: client->server
        content:
          type: command
          id: "cmd-123"
          command: transport/seek
          payload:
            position: 60.0
      - direction: server->client
        content:
          type: response
          id: "cmd-123"
          success: true
      # Server also pushes transport update
      - direction: server->client
        content:
          type: event
          event: transport
          payload:
            positionSeconds: 60.0
            positionBeats: "16.1.00"

  region-edit:
    description: Client edits a region
    messages:
      - direction: client->server
        content:
          type: command
          id: "cmd-456"
          command: region/update
          payload:
            id: 3
            startSeconds: 10.0
            endSeconds: 25.0
            name: "Verse 1"
      - direction: server->client
        content:
          type: response
          id: "cmd-456"
          success: true
      - direction: server->client
        content:
          type: event
          event: regions
          payload:
            changes: [{ action: update, id: 3 }]
            regions:
              - id: 3
                startSeconds: 10.0
                endSeconds: 25.0
                name: "Verse 1"
                color: 0
                startFormatted: "3.1.00"
                endFormatted: "7.1.00"

  batch-operation:
    description: Ripple edit - move multiple regions atomically
    messages:
      - direction: client->server
        content:
          type: command
          id: "cmd-789"
          command: batch
          payload:
            commands:
              - command: region/update
                payload: { id: 1, startSeconds: 10, endSeconds: 20 }
              - command: region/update
                payload: { id: 2, startSeconds: 25, endSeconds: 35 }
              - command: region/update
                payload: { id: 3, startSeconds: 40, endSeconds: 50 }
      - direction: server->client
        content:
          type: response
          id: "cmd-789"
          success: true
          payload:
            results: [{ success: true }, { success: true }, { success: true }]

# =============================================================================
# Performance Characteristics
# =============================================================================

x-performance:
  polling-interval:
    description: Internal REAPER state polling
    value: "5-10ms"
    note: Native code can poll much faster than Lua scripts

  push-latency:
    description: Time from REAPER state change to WebSocket push
    value: "<15ms typical"

  change-detection:
    description: Uses GetProjectStateChangeCount() + individual state diffing
    note: Only pushes actual changes, not full state

  client-traffic:
    description: Compared to current HTTP polling approach
    comparison:
      before: "~33 HTTP requests/second with full response parsing"
      after: "1 WebSocket connection, delta pushes only on change"

# =============================================================================
# Migration from Current HTTP API
# =============================================================================

x-migration:
  replaces:
    - endpoint: "/_/TRANSPORT"
      with: "transport event subscription"
      benefit: "Push instead of poll"

    - endpoint: "/_/BEATPOS"
      with: "transport.bpm, transport.timeSignature"
      benefit: "Direct BPM value, no reverse calculation"

    - endpoint: "Cursor movement hack for time selection"
      with: "timeSelection event subscription"
      benefit: "No side effects, direct API access"

    - endpoint: "/_/EXTSTATE for script detection"
      with: "Can expose any state directly"
      benefit: "No polling, instant notification"

    - endpoint: "Multiple MARKER_*/REGION_* commands"
      with: "markers/regions arrays in snapshot + delta updates"
      benefit: "Single subscription, granular change tracking"
