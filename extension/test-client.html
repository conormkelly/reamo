<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reamo Extension Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .status-box {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .success { color: #0f9b0f; }
        .error { color: #e94560; }
        .pending { color: #f39c12; }
        h1 { color: #eee; margin-bottom: 30px; }
        h3 { margin-top: 0; }
        button {
            background: #0f9b0f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #0c7a0c; }
        .value {
            font-family: 'Monaco', 'Menlo', monospace;
            background: #0f0f1a;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 8px;
            word-break: break-all;
        }
        .step {
            margin: 15px 0;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            border-left: 4px solid #4a4a6a;
        }
        .step.pass { border-color: #0f9b0f; }
        .step.fail { border-color: #e94560; }
    </style>
</head>
<body>
    <h1>🔌 Reamo Extension Test</h1>

    <div class="status-box">
        <h3>Phase 1: EXTSTATE Test</h3>
        <p>This tests whether the Zig extension loaded correctly and set EXTSTATE values.</p>
        <button onclick="runTest()">Run Test</button>
    </div>

    <div id="results"></div>

    <script>
        async function fetchExtState(section, key) {
            try {
                const response = await fetch(`/_/GET/EXTSTATE/${section}/${key}`);
                const text = await response.text();
                // Response format: EXTSTATE\tSection\tKey\tValue (tab-separated)
                const parts = text.trim().split('\t');
                if (parts.length >= 4 && parts[0] === 'EXTSTATE') {
                    return parts[3];
                }
                return null;
            } catch (e) {
                throw new Error(`HTTP error: ${e.message}`);
            }
        }

        function addResult(title, success, details) {
            const results = document.getElementById('results');
            const step = document.createElement('div');
            step.className = `step ${success ? 'pass' : 'fail'}`;
            step.innerHTML = `
                <strong class="${success ? 'success' : 'error'}">${success ? '✓' : '✗'} ${title}</strong>
                <div class="value">${details}</div>
            `;
            results.appendChild(step);
        }

        async function runTest() {
            const results = document.getElementById('results');
            results.innerHTML = '<p class="pending">Testing...</p>';

            await new Promise(r => setTimeout(r, 100));
            results.innerHTML = '';

            // Test 1: Fetch WebSocketPort
            try {
                const port = await fetchExtState('Reamo', 'WebSocketPort');
                if (port) {
                    addResult('WebSocketPort EXTSTATE', true, `Value: "${port}"`);
                } else {
                    addResult('WebSocketPort EXTSTATE', false, 'Not found - extension may not be loaded');
                }
            } catch (e) {
                addResult('WebSocketPort EXTSTATE', false, e.message);
            }

            // Test 2: Fetch Secret
            try {
                const secret = await fetchExtState('Reamo', 'Secret');
                if (secret) {
                    addResult('Secret EXTSTATE', true, `Value: "${secret}"`);
                } else {
                    addResult('Secret EXTSTATE', false, 'Not found');
                }
            } catch (e) {
                addResult('Secret EXTSTATE', false, e.message);
            }

            // Summary
            const allPassed = document.querySelectorAll('.step.fail').length === 0;
            const summary = document.createElement('div');
            summary.className = 'status-box';
            summary.innerHTML = allPassed
                ? '<h3 class="success">✅ All tests passed!</h3><p>The Zig extension loaded correctly and set EXTSTATE values. Next step: add WebSocket server.</p>'
                : '<h3 class="error">❌ Some tests failed</h3><p>Make sure REAPER is running and the extension is loaded. Check View → Show Console for messages.</p>';
            results.appendChild(summary);
        }
    </script>
</body>
</html>
