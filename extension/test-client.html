<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reamo Extension Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .status-box {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .success { color: #0f9b0f; }
        .error { color: #e94560; }
        .pending { color: #f39c12; }
        h1 { color: #eee; margin-bottom: 30px; }
        h3 { margin-top: 0; }
        button {
            background: #0f9b0f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            margin-right: 10px;
        }
        button:hover { background: #0c7a0c; }
        button.secondary {
            background: #4a4a6a;
        }
        button.secondary:hover { background: #5a5a7a; }
        button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .value {
            font-family: 'Monaco', 'Menlo', monospace;
            background: #0f0f1a;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 8px;
            word-break: break-all;
        }
        .step {
            margin: 15px 0;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            border-left: 4px solid #4a4a6a;
        }
        .step.pass { border-color: #0f9b0f; }
        .step.fail { border-color: #e94560; }
        #ws-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            margin-left: 10px;
        }
        #ws-status.connected { background: #0f9b0f; }
        #ws-status.disconnected { background: #e94560; }
        #ws-status.connecting { background: #f39c12; }
        #message-input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #4a4a6a;
            background: #0f0f1a;
            color: #eee;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        #log {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-entry { margin: 5px 0; }
        .log-sent { color: #3498db; }
        .log-received { color: #2ecc71; }
        .log-error { color: #e94560; }
        .log-info { color: #9b9b9b; }
    </style>
</head>
<body>
    <h1>Reamo Extension Test</h1>

    <div class="status-box">
        <h3>Phase 1: EXTSTATE Test</h3>
        <p>Tests whether the Zig extension loaded and set EXTSTATE values.</p>
        <button onclick="runExtStateTest()">Run EXTSTATE Test</button>
    </div>

    <div id="extstate-results"></div>

    <div class="status-box">
        <h3>Phase 2: WebSocket Test <span id="ws-status" class="disconnected">Disconnected</span></h3>
        <p>Tests WebSocket connection to the extension server.</p>
        <button id="ws-connect-btn" onclick="connectWebSocket()">Connect</button>
        <button id="ws-disconnect-btn" class="secondary" onclick="disconnectWebSocket()" disabled>Disconnect</button>
        <input type="text" id="message-input" placeholder='{"type":"command","command":"transport/play"}' onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="margin-top:10px">Send Message</button>
    </div>

    <div class="status-box">
        <h3>WebSocket Log</h3>
        <div id="log"></div>
    </div>

    <script>
        let ws = null;
        let wsPort = 9224;

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateWsStatus(status) {
            const statusEl = document.getElementById('ws-status');
            statusEl.className = status;
            statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);

            document.getElementById('ws-connect-btn').disabled = status === 'connected' || status === 'connecting';
            document.getElementById('ws-disconnect-btn').disabled = status === 'disconnected';
        }

        async function fetchExtState(section, key) {
            try {
                const response = await fetch(`/_/GET/EXTSTATE/${section}/${key}`);
                const text = await response.text();
                const parts = text.trim().split('\t');
                if (parts.length >= 4 && parts[0] === 'EXTSTATE') {
                    return parts[3];
                }
                return null;
            } catch (e) {
                throw new Error(`HTTP error: ${e.message}`);
            }
        }

        function addResult(container, title, success, details) {
            const results = document.getElementById(container);
            const step = document.createElement('div');
            step.className = `step ${success ? 'pass' : 'fail'}`;
            step.innerHTML = `
                <strong class="${success ? 'success' : 'error'}">${success ? '✓' : '✗'} ${title}</strong>
                <div class="value">${details}</div>
            `;
            results.appendChild(step);
        }

        async function runExtStateTest() {
            const results = document.getElementById('extstate-results');
            results.innerHTML = '<p class="pending">Testing...</p>';
            await new Promise(r => setTimeout(r, 100));
            results.innerHTML = '';

            // Test WebSocketPort
            try {
                const port = await fetchExtState('Reamo', 'WebSocketPort');
                if (port) {
                    wsPort = parseInt(port, 10);
                    addResult('extstate-results', 'WebSocketPort EXTSTATE', true, `Value: "${port}"`);
                } else {
                    addResult('extstate-results', 'WebSocketPort EXTSTATE', false, 'Not found - extension may not be loaded');
                }
            } catch (e) {
                addResult('extstate-results', 'WebSocketPort EXTSTATE', false, e.message);
            }

            // Summary
            const allPassed = document.querySelectorAll('#extstate-results .step.fail').length === 0;
            const summary = document.createElement('div');
            summary.className = 'status-box';
            summary.innerHTML = allPassed
                ? `<h3 class="success">EXTSTATE OK</h3><p>Extension loaded. WebSocket port: ${wsPort}</p>`
                : '<h3 class="error">EXTSTATE Failed</h3><p>Make sure REAPER is running and the extension is loaded.</p>';
            results.appendChild(summary);
        }

        async function connectWebSocket() {
            updateWsStatus('connecting');
            // Use same host as page (works for both localhost and remote access)
            const wsHost = window.location.hostname;
            log(`Connecting to ws://${wsHost}:${wsPort}...`, 'info');

            try {
                ws = new WebSocket(`ws://${wsHost}:${wsPort}`);

                ws.onopen = () => {
                    updateWsStatus('connected');
                    log('Connected!', 'received');
                };

                ws.onmessage = (event) => {
                    log(`← ${event.data}`, 'received');
                };

                ws.onerror = (error) => {
                    log(`Error: ${error.message || 'Connection failed'}`, 'error');
                };

                ws.onclose = (event) => {
                    updateWsStatus('disconnected');
                    log(`Disconnected (code: ${event.code}, reason: ${event.reason || 'none'})`, 'info');
                    ws = null;
                };
            } catch (e) {
                updateWsStatus('disconnected');
                log(`Failed to connect: ${e.message}`, 'error');
            }
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
                log(`→ ${message}`, 'sent');
                input.value = '';
            } else {
                log('Not connected', 'error');
            }
        }

        // Auto-run EXTSTATE test on load
        runExtStateTest();
    </script>
</body>
</html>
